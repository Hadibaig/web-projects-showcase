<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Builder App</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body class="light-theme">

<header>
    <h1>Timeline Builder</h1>
    <p>Create and customize company timelines visually</p>
</header>

<!-- NOTIFICATION -->
<div id="notification" class="notification"></div>

<main class="container">

    <!-- LEFT PANEL -->
    <section class="form-panel">

        <h2>Timeline Event</h2>

        <!-- SEARCH -->
        <input 
            type="text"
            id="search"
            placeholder="Search events..."
            oninput="handleSearch(this.value)"
        >

        <!-- CATEGORY FILTER -->
        <select id="categoryFilter" onchange="handleCategory(this.value)">
            <option value="all">All</option>
            <option value="Funding">Funding</option>
            <option value="Growth">Growth</option>
            <option value="Awards">Awards</option>
        </select>

        <form id="timelineForm">

            <!-- CATEGORY INPUT -->
            <input 
                type="text"
                id="categoryInput"
                placeholder="Category (Funding, Growth, Awards)"
            >

            <div class="form-group">
                <label>Year</label>
                <input type="text" id="year" required>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn">
                Add Event
            </button>

        </form>

    </section>

    <!-- RIGHT PANEL -->
    <section class="timeline-panel">

        <!-- TOP CONTROLS (CLEAN STRUCTURE) -->
        <div class="controls">

            <div class="control-group">
                <h3>Theme</h3>
                <button onclick="changeTheme('light-theme')">Light</button>
                <button onclick="changeTheme('dark-theme')">Dark</button>
                <button onclick="changeTheme('corporate-theme')">Corporate</button>
                <button onclick="changeTheme('startup-theme')">Startup</button>
            </div>

            <div class="control-group">
                <h3>Layout</h3>
                <button onclick="changeLayout('standard')">Standard</button>
                <button onclick="changeLayout('alternating')">Alternating</button>
                <button onclick="changeLayout('compact')">Compact</button>
            </div>

            <!-- V5 ACTIONS (ONLY ONCE HERE) -->
            <div class="control-group">
                <h3>Data</h3>

                <button onclick="handleExport()">Export JSON</button>

                <input type="file" onchange="handleImport(event)">

                <button onclick="undo()">Undo</button>

                <button onclick="clearAll()">Clear All</button>
            </div>

        </div>

        <h2>Timeline Preview</h2>

        <div id="timeline" class="timeline standard"></div>

    </section>

</main>

<!-- SCRIPTS (FIXED ORDER) -->
<script src="./JS/storage.js"></script>
<script src="./JS/export.js"></script>
<script src="./JS/search.js"></script>
<script src="./JS/app.js"></script>
<script src="./JS/scripts.js"></script>


</body>
</html>
